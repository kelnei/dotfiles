# ==============================================================================
# general
# ==============================================================================

# set prefix to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# enable 256 colors and true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# increase scrollback buffer
set -g history-limit 50000

# start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# reduce escape time (important for neovim)
set -sg escape-time 10

# enable focus events (important for neovim autoread)
set -g focus-events on

# enable mouse support
set -g mouse on

# increase tmux message display time
set -g display-time 2000

# ==============================================================================
# keybindings
# ==============================================================================

# reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# open new windows in current directory
bind c new-window -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# easier splits with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ==============================================================================
# copy mode (vim-style)
# ==============================================================================

set-window-option -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==============================================================================
# plugins (managed by TPM)
# ==============================================================================

# sensible defaults
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# session persistence across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tokyonight theme
set -g @plugin 'janoamaral/tokyo-night-tmux'

# resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# continuum settings - auto-save every 15 minutes and restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tokyo-night theme settings
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

# initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
